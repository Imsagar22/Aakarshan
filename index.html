<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aakarshan | Jewelry Management</title>
    <script>
      // Fix for "Cannot set property fetch of #<Window> which has only a getter"
      // This happens when some code (polyfills, etc.) tries to overwrite a read-only fetch.
      (function() {
        try {
          const originalFetch = window.fetch;
          // Check if we can actually redefine it
          const descriptor = Object.getOwnPropertyDescriptor(window, 'fetch');
          if (!descriptor || descriptor.configurable) {
            Object.defineProperty(window, 'fetch', {
              get: function() { return originalFetch; },
              set: function(v) { 
                console.warn('Something tried to override window.fetch. The assignment was ignored to prevent a crash.', v);
              },
              configurable: true,
              enumerable: true
            });
          }
        } catch (e) {
          console.error('Failed to patch fetch:', e);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
