<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <script>
      // Fix for "Cannot set property fetch of #<Window> which has only a getter"
      // This happens when some polyfills try to override a read-only fetch getter.
      (function() {
        try {
          const fetchDescriptor = Object.getOwnPropertyDescriptor(Window.prototype, 'fetch') || Object.getOwnPropertyDescriptor(window, 'fetch');
          if (fetchDescriptor && !fetchDescriptor.writable && !fetchDescriptor.set && fetchDescriptor.configurable) {
            const originalFetch = window.fetch;
            Object.defineProperty(window, 'fetch', {
              value: originalFetch,
              writable: true,
              configurable: true,
              enumerable: true
            });
          }
        } catch (e) {
          // Ignore errors during polyfill fix
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
